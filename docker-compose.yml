version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: brainvault
      POSTGRES_USER: brainvault
      POSTGRES_PASSWORD: brainvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: services/api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://brainvault:brainvault@postgres:5432/brainvault
      REDIS_URL: redis://redis:6379/0
      OBJECT_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET_NAME: brainvault
    ports:
      - "8000:8000"
    volumes:
      - ./runtime:/app/runtime
      - ./vault:/app/vault
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: services/worker
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./runtime:/app/runtime
      - ./vault:/app/vault
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.rq_worker

volumes:
  postgres_data:
  redis_data:
  minio_data:
